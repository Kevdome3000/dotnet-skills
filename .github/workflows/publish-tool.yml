name: Publish Dotnet Tool

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: "NuGet package version to publish, for example 1.2.3"
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: "10.0.x"
  TOOL_PROJECT: "tools/DotnetSkills.Tooling/DotnetSkills.Tooling.csproj"
  PACKAGE_SOURCE: "https://api.nuget.org/v3/index.json"
  PACKAGE_OUTPUT_GLOB: "artifacts/nuget/*.nupkg"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Determine package version
        id: version
        shell: bash
        run: |
          release_tag='${{ github.event.release.tag_name }}'
          manual_version='${{ inputs.package_version }}'

          if [[ -n "$release_tag" ]]; then
            version="${release_tag#v}"
          else
            version="$manual_version"
          fi

          if [[ -z "$version" ]]; then
            echo "Package version is required." >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Package version must be SemVer-compatible. Got: $version" >&2
            exit 1
          fi

          echo "package_version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate catalog outputs in CI
        run: python3 scripts/generate_catalog.py

      - name: Build dotnet tool
        run: dotnet build "${{ env.TOOL_PROJECT }}" -c Release -p:ContinuousIntegrationBuild=true -p:Version="${{ steps.version.outputs.package_version }}"

      - name: Pack dotnet tool
        run: dotnet pack "${{ env.TOOL_PROJECT }}" -c Release --no-build -p:ContinuousIntegrationBuild=true -p:Version="${{ steps.version.outputs.package_version }}"

      - name: Smoke test installable tool
        run: bash scripts/smoke_test_tool.sh artifacts/nuget

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: managedcode-dotnet-skills-tool-${{ steps.version.outputs.package_version }}
          path: ${{ env.PACKAGE_OUTPUT_GLOB }}
          if-no-files-found: error

      - name: Acquire NuGet API key with Trusted Publishing
        id: nuget_login
        if: ${{ secrets.NUGET_USER != '' }}
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Fail when no publish credentials are configured
        if: ${{ steps.nuget_login.outputs.NUGET_API_KEY == '' && secrets.NUGET_API_KEY == '' }}
        shell: bash
        run: |
          echo "Configure NuGet Trusted Publishing with NUGET_USER or set the fallback NUGET_API_KEY secret." >&2
          exit 1

      - name: Publish to NuGet with Trusted Publishing
        if: ${{ steps.nuget_login.outputs.NUGET_API_KEY != '' }}
        run: dotnet nuget push "${{ env.PACKAGE_OUTPUT_GLOB }}" --source "${{ env.PACKAGE_SOURCE }}" --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --skip-duplicate

      - name: Publish to NuGet with API key fallback
        if: ${{ steps.nuget_login.outputs.NUGET_API_KEY == '' && secrets.NUGET_API_KEY != '' }}
        run: dotnet nuget push "${{ env.PACKAGE_OUTPUT_GLOB }}" --source "${{ env.PACKAGE_SOURCE }}" --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate
